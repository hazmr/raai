name: raai
description: Raai (راعي) — livestock notes app (farmer + vet).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking + secure tokens
  dio: ^5.5.0
  flutter_secure_storage: ^9.2.2

  # Local cache + offline outbox (drift / SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Field features — re-added in build-order steps 6 (scan) & 7 (voice notes),
  # together with the Android compileSdk/AGP bumps they require.
  # mobile_scanner: ^5.1.1
  # speech_to_text: ^7.0.0

  # i18n + small utilities required by the offline engine (§7)
  intl: ^0.19.0
  uuid: ^4.4.0            # idempotency keys (uuid v4)
  connectivity_plus: ^6.0.3  # sync trigger: connectivity regained

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true   # build l10n from lib/l10n/*.arb

  # Cairo font: drop the TTFs into assets/fonts and they'll be picked up.
  # If absent, the app falls back to the system font (no build error).
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700
