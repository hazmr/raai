{{define "login"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Raai Admin · Sign in</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body>
  <div class="login">
    <h1>راعي · Admin</h1>
    {{if .Data.Error}}<p class="err">{{.Data.Error}}</p>{{end}}
    <form method="post" action="/admin/login">
      <input type="hidden" name="csrf" value="{{.CSRF}}">
      <div class="row"><input name="phone" placeholder="Phone number" required style="width:100%"></div>
      <div class="row"><input name="password" type="password" placeholder="Password" required style="width:100%"></div>
      <div class="row"><button type="submit" style="width:100%">Sign in</button></div>
    </form>
  </div>
</body>
</html>{{end}}
